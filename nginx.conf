server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # No caching for env.js (generated at runtime)
    location = /env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
